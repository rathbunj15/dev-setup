---
- name: Install development packages into system.
  hosts: localhost
  gather_facts: true

  vars:
    packages:
      - ansible-lint
      - zip
      - unzip
      - wget
      - curl
      - git
      - make
      - jq
      - jid
      - screen
      - yq
    py_dev_packages:
      - thefuck
      - black
      - pylint

  tasks:
    - name: Install packages
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      loop: "{{ packages }}"
      become: true

    - name: Install helm
      block:
        - name: Verify helm is not installed
          ansible.builtin.stat:
            path: /usr/local/bin/helm
          register: helm_installed

        - name: Download Helm install script
          ansible.builtin.uri:
            url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
            method: GET
            dest: /tmp/get-helm-3.sh
            mode: '0755'
          when: (not helm_installed.stat.exists)

        - name: Run Helm install script
          ansible.builtin.shell: /tmp/get-helm-3.sh
          args:
            executable: /bin/bash
            creates: /usr/local/bin/helm
          when: (not helm_installed.stat.exists)

    - name: Determine target non-root user for pip installs
      ansible.builtin.set_fact:
        target_user: "{{ lookup('env', 'SUDO_USER') | default(ansible_user_id) }}"

    - name: Determine home directory for target user
      ansible.builtin.set_fact:
        target_home: "{{ '/root' if (target_user == 'root') else '/home/' + target_user }}"

    - name: Install Python development packages for target user
      ansible.builtin.command: "python3 -m pip install --user --break-system-packages {{ py_dev_packages | join(' ') }}"
      become: true
      become_user: "{{ target_user }}"
      environment:
        HOME: "{{ target_home }}"
